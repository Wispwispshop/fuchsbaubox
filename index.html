<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Fuchsbaubox</title>

  <!-- The Bold Font (free Alternative Einbindung) -->
  <style>
    @font-face {
      font-family: 'BoldFont';
      src: url('https://fonts.cdnfonts.com/s/16216/THEBOLDFONTFREEVERSION.woff') format('woff');
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ff66b2; /* rosa */
      color: white;
      text-align: center;
    }

    h1 {
      font-family: 'BoldFont', Arial, sans-serif;
      font-size: 60px;
      margin-top: 60px;
      margin-bottom: 40px;
    }

    .images {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    .images img {
      width: 300px;
      border-radius: 10px;
    }

    .buy-button {
      margin: 60px 0;
    }

    button {
      background-color: white;
      color: #ff66b2;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>

<h1>FUCHSBAUBOX</h1>

<div class="images">
  <img src="https://via.placeholder.com/300x200">
  <img src="https://via.placeholder.com/300x200">
  <img src="https://via.placeholder.com/300x200">
</div>

<div class="buy-button">
  <a href="https://paypal.me/DEINNAME">
    <button>Kaufen</button>
  </a>
</div>

</body>
</html>
